# Configuration Agent Zero - Mode LLM Local Exclusif
# Utilise llama-server existant (Hermes-3-Llama-3.1-8B) sur port 8080
provider: "openai-compatible"
default_model: "hermes-3-8b"

# Configuration OpenAI-compatible (llama-server sur port 8080)
openai_compatible:
  enabled: true
  base_url: "http://localhost:11434/v1"
  model: "hermes-3-8b"
  api_key: "ollama"
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  num_ctx: 16384

# Alternative Ollama (quand disponible)
ollama:
  enabled: false
  base_url: "http://localhost:11434"
  model: "llama3.2:3b"

# Désactiver OpenRouter COMPLÈTEMENT
openrouter:
  enabled: false
  api_key: ""
  
openai:
  enabled: false
  api_key: ""

# Extensions - Configuration Locale
extensions:
  memorize_solutions:
    enabled: true
    provider: "openai-compatible"
    base_url: "http://localhost:11434/v1"
    model: "hermes-3-8b"
    max_memory_items: 50
    
  code_generation:
    enabled: true
    provider: "openai-compatible"
    base_url: "http://localhost:11434/v1"
    model: "hermes-3-8b"
    
  summarization:
    enabled: true
    provider: "openai-compatible"
    base_url: "http://localhost:11434/v1"
    model: "hermes-3-8b"

# Logging détaillé
logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "~/.a0/logs/agent_zero.log"
  max_size_mb: 100
  backup_count: 5

# Timeout et performance
performance:
  request_timeout_seconds: 60
  max_concurrent_requests: 3
  enable_caching: true

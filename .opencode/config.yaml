# OpenCode CLI Configuration pour Hermes-3 local via adaptateur FastAPI
# Utilise l'adaptateur OpenAI-compatible expose sur http://localhost:9000

models:
  hermes-local:
    name: "Hermes-3 Local (8B Q4)"
    provider: openai
    base_url: http://localhost:9000/v1
    api_key: dummy
    model: hermes-3
    max_tokens: 2048
    temperature: 0.7

default_model: hermes-local

# Configuration OAC pour Agent Zero
agents:
  agentzero-specialist:
    model: hermes-local
    context:
      - project-intelligence/agent-zero.md
    skills:
      - core/debug
      - core/docker
